<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>埼玉マスタークイズ | 2026 Saitama Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Mochiy+Pop+One&family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; color: #166534; }
        .accent-font { font-family: 'Mochiy Pop One', sans-serif; }
        .quiz-container { background: white; border-radius: 32px; box-shadow: 0 20px 50px rgba(22, 101, 52, 0.1); }
        .option-btn {
            width: 100%; text-align: left; padding: 20px; margin-bottom: 12px;
            border: 2px solid #dcfce7; border-radius: 16px; transition: all 0.2s;
            background: white; cursor: pointer;
        }
        .option-btn:hover { border-color: #22c55e; background: #f0fdf4; }
        .option-btn.correct { background: #22c55e !important; color: white; border-color: #16a34a; }
        .option-btn.wrong { background: #ef4444 !important; color: white; border-color: #dc2626; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <a href="saitama-mini-game.html" class="fixed top-6 left-6 bg-white dark:bg-slate-800 p-2 px-4 rounded-full shadow-lg font-bold z-50">🔙 戻る</a>
    <button onclick="openHelp('quiz')" class="fixed top-6 right-6 bg-white dark:bg-slate-800 p-2 px-4 rounded-full shadow-lg font-bold z-50">❓ 遊び方</button>

    <div id="quiz-app" class="quiz-container max-w-2xl w-full p-8 md:p-12">
        <div id="start-screen" class="text-center">
            <h1 class="text-4xl accent-font mb-6">埼玉マスターへの道</h1>
            <p class="text-lg mb-8">あなたは埼玉のことをどれだけ知っていますか？<br>全5問のクイズに答えて、伝説の「埼玉マスター」を目指しましょう！</p>
            <button onclick="startQuiz()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-12 rounded-full text-xl transition-transform hover:scale-105">
                挑戦をはじめる
            </button>
            <div class="mt-8 text-sm opacity-60">全問正解で「秘密のクーポン」をゲット！</div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <span id="progress" class="text-sm font-bold bg-green-100 px-4 py-1 rounded-full">第 1 / 5 問</span>
                <span id="score-display" class="text-sm">正解: 0</span>
            </div>
            <h2 id="question-text" class="text-2xl font-bold mb-8"></h2>
            <div id="options-container"></div>
        </div>

        <div id="result-screen" class="hidden text-center">
            <h2 class="text-3xl accent-font mb-4">結果発表！</h2>
            <div id="final-score" class="text-6xl font-black text-green-600 mb-6"></div>
            <p id="rank-text" class="text-xl font-bold mb-8"></p>

            <div id="coupon-area" class="hidden bg-yellow-50 border-2 border-yellow-200 p-6 rounded-2xl mb-8">
                <p class="text-yellow-800 font-bold mb-2">🎉 おめでとう！埼玉マスター認定 🎉</p>
                <p class="text-sm mb-4">秘密のクーポンコードを表示します</p>
                <div class="bg-white border-2 border-dashed border-yellow-400 py-3 font-mono text-2xl font-bold tracking-widest text-yellow-600">
                    SAITAMA2026KEBR
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="bg-green-600 text-white font-bold py-3 rounded-xl">もう一度挑戦</button>
                <a href="saitama-mini-game.html" class="text-green-600 font-bold py-2 underline">ゲームセンターへ戻る</a>
            </div>
        </div>
    </div>

    <!-- ヘルプ用ポップアップ -->
    <div id="help-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden p-6" onclick="closeHelp()">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full" onclick="event.stopPropagation()">
            <h3 id="help-title" class="text-2xl font-bold mb-4 text-emerald-700">埼玉マスタークイズの遊び方</h3>
            <div id="help-content" class="text-gray-600 space-y-4">
                <p>1. 次々に出題される4択クイズに答えよう。</p>
                <p>2. 全5問。正解数に応じて称号が変わるぞ。</p>
                <p>3. 全問正解すると、秘密のクーポンが手に入る！</p>
            </div>
            <button onclick="closeHelp()" class="mt-8 w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">分かった！</button>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        function openHelp() { document.getElementById('help-modal').classList.remove('hidden'); }
        function closeHelp() { document.getElementById('help-modal').classList.add('hidden'); }

        const quizData = [
            {
                q: "埼玉県の大宮公園にある、日本最古級の飼育施設があるのは？",
                o: ["動物園", "遊園地", "水族館", "植物園"],
                a: 0
            },
            {
                q: "「航空発祥の地」として知られる埼玉県内の公園は？",
                o: ["大宮公園", "秋ヶ瀬公園", "森林公園", "所沢航空記念公園"],
                a: 3
            },
            {
                q: "日本で最初の国営公園である「国営武蔵丘陵森林公園」の広さは、東京ドーム何個分？",
                o: ["約10個分", "約30個分", "約65個分", "約120個分"],
                a: 2
            },
            {
                q: "秋ヶ瀬公園内にある、珍しい野鳥が多く飛来することで有名な場所は？",
                o: ["カモの池", "ピクニックの森", "レンジャクの庭", "サクラソウ自生地"],
                a: 1
            },
            {
                q: "丸山公園にある「小さな水族館」に展示されている、埼玉県を代表する魚は？",
                o: ["メダカ", "アユ", "ムサシトミヨ", "イワナ"],
                a: 2
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const data = quizData[currentQuestion];
            document.getElementById('progress').textContent = `第 ${currentQuestion + 1} / ${quizData.length} 問`;
            document.getElementById('question-text').textContent = data.q;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.o.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectOption(index, btn);
                container.appendChild(btn);
            });
        }

        function selectOption(index, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const data = quizData[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');

            if (index === data.a) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score-display').textContent = `正解: ${score}`;
            } else {
                btn.classList.add('wrong');
                allBtns[data.a].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            document.getElementById('final-score').textContent = `${score} / ${quizData.length}`;

            let rank = "";
            if (score === 5) {
                rank = "伝説の埼玉マスター！";
                document.getElementById('coupon-area').classList.remove('hidden');
            } else if (score >= 3) {
                rank = "埼玉探検家（あと少し！）";
            } else {
                rank = "埼玉初心者（もっと公園に行こう！）";
            }
            document.getElementById('rank-text').textContent = rank;
        }
    </script>
</body>
</html>

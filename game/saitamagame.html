<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAITAMA PARK: 3D公園散策 | 2026 Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "selector"
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Noto Sans JP', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ui-element { pointer-events: auto; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; color: #2c3e50; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .score-board { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: white; padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(5px); }
        .controls-hint { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; font-size: 12px; }

        #loading-screen {
            position: fixed; inset: 0; background: #1b5e20; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s;
        }
        .progress-bar { width: 250px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .progress-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s; }

        #win-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 class="text-3xl font-bold text-white mb-2" style="font-family: 'Mochiy Pop One';">SAITAMA PARK</h1>
        <p class="text-white opacity-80">公園を生成中...</p>
        <div class="progress-bar"><div class="progress-fill" id="loader-fill"></div></div>
    </div>

    <div id="win-screen">
        <h2 class="text-5xl font-bold text-yellow-400 mb-4" style="font-family: 'Mochiy Pop One';">CLEAN UP!</h2>
        <p class="text-white text-xl mb-8 text-center">公園のゴミをすべて拾いました！<br>綺麗な公園を維持しましょう。</p>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="bg-white text-green-700 font-bold px-8 py-3 rounded-full hover:scale-105 transition">もう一度遊ぶ</button>
            <a href="../saitama-mini-game.html" class="bg-green-600 text-white font-bold px-8 py-3 rounded-full hover:scale-105 transition">戻る</a>
        </div>
    </div>

    <div class="ui-overlay">
        <a href="../saitama-mini-game.html" class="ui-element back-btn">⬅ 戻る</a>
        <div class="score-board">
            <div class="text-xs opacity-70 mb-1">PICKED UP TRASH</div>
            <div class="text-2xl font-bold"><span id="score">0</span> / 8</div>
        </div>
        <div class="controls-hint">
            <b>SAITAMA PARK 散策モード</b><br>
            [W][A][S][D] / [↑][←][↓][→] : 移動<br>
            マウスドラッグ : 視点回転<br>
            ゴミに近づくと自動で拾います
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let items = [];
        let score = 0;
        const totalItems = 8;

        const player = {
            velocity: new THREE.Vector3(),
            speed: 0.18
        };
        const keys = {};

        function init() {
            // Setup Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 120);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 8);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 3;
            controls.maxDistance = 20;
            controls.maxPolarAngle = Math.PI / 2.1;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(50, 100, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.left = -50;
            sunLight.shadow.camera.right = 50;
            sunLight.shadow.camera.top = 50;
            sunLight.shadow.camera.bottom = -50;
            scene.add(sunLight);

            // Ground (Grass)
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x4caf50 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Paths (Sandy road)
            const pathGeo = new THREE.PlaneGeometry(10, 200);
            const pathMat = new THREE.MeshPhongMaterial({ color: 0xddc4a1 });
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = -Math.PI / 2;
            path.position.y = 0.01;
            path.receiveShadow = true;
            scene.add(path);

            const pathCrossGeo = new THREE.PlaneGeometry(200, 8);
            const pathCross = new THREE.Mesh(pathCrossGeo, pathMat);
            pathCross.rotation.x = -Math.PI / 2;
            pathCross.position.y = 0.01;
            pathCross.receiveShadow = true;
            scene.add(pathCross);

            // Pond
            const pondGeo = new THREE.CircleGeometry(15, 32);
            const pondMat = new THREE.MeshPhongMaterial({
                color: 0x00bcd4,
                transparent: true,
                opacity: 0.8,
                shininess: 100
            });
            const pond = new THREE.Mesh(pondGeo, pondMat);
            pond.rotation.x = -Math.PI / 2;
            pond.position.set(25, 0.02, 25);
            scene.add(pond);

            // Benches
            for(let i=0; i<8; i++) {
                createBench(
                    (i % 2 === 0 ? 6 : -6),
                    (i - 4) * 15
                );
            }

            // Trees
            for(let i=0; i<100; i++) {
                let rx = (Math.random() - 0.5) * 120;
                let rz = (Math.random() - 0.5) * 120;
                // Avoid paths and pond
                if(Math.abs(rx) < 7 && Math.abs(rz) < 100) continue;
                if(Math.abs(rz) < 5 && Math.abs(rx) < 100) continue;
                if(Math.sqrt((rx-25)**2 + (rz-25)**2) < 18) continue;

                createTree(rx, rz, Math.random() > 0.7 ? 'sakura' : 'pine');
            }

            // Trash Items (Targets)
            for(let i=0; i<totalItems; i++) {
                const item = createTrash(
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 60
                );
                items.push(item);
            }

            // Keyboard Events
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);

            // Fake Loading
            let fill = 0;
            const fillInterval = setInterval(() => {
                fill += 4;
                document.getElementById('loader-fill').style.width = fill + '%';
                if(fill >= 100) {
                    clearInterval(fillInterval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.opacity = '0';
                        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
                    }, 300);
                }
            }, 60);

            animate();
        }

        function createBench(x, z) {
            const group = new THREE.Group();
            const seatGeo = new THREE.BoxGeometry(3, 0.2, 1);
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x8d6e63 });
            const seat = new THREE.Mesh(seatGeo, woodMat);
            seat.position.y = 0.5;
            seat.castShadow = true;
            group.add(seat);

            const legGeo = new THREE.BoxGeometry(0.1, 0.5, 0.1);
            const legMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const legs = [
                [1.4, 0.25, 0.4], [-1.4, 0.25, 0.4],
                [1.4, 0.25, -0.4], [-1.4, 0.25, -0.4]
            ];
            legs.forEach(p => {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(...p);
                group.add(leg);
            });

            group.position.set(x, 0, z);
            if(x > 0) group.rotation.y = Math.PI / 2;
            else group.rotation.y = -Math.PI / 2;
            scene.add(group);
        }

        function createTree(x, z, type) {
            const group = new THREE.Group();

            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.4, 2, 8);
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x5d4037 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1;
            trunk.castShadow = true;
            group.add(trunk);

            let leaveGeo, leaveMat;
            if(type === 'sakura') {
                leaveGeo = new THREE.SphereGeometry(1.5, 8, 8);
                leaveMat = new THREE.MeshPhongMaterial({ color: 0xffc1e3 }); // Pink
            } else {
                leaveGeo = new THREE.ConeGeometry(1.5, 4, 8);
                leaveMat = new THREE.MeshPhongMaterial({ color: 0x1b5e20 }); // Dark Green
            }

            const leaves = new THREE.Mesh(leaveGeo, leaveMat);
            leaves.position.y = type === 'sakura' ? 2.5 : 3.5;
            leaves.castShadow = true;
            group.add(leaves);

            group.position.set(x, 0, z);
            scene.add(group);
        }

        function createTrash(x, z) {
            const types = [
                new THREE.BoxGeometry(0.3, 0.5, 0.1), // Paper
                new THREE.CylinderGeometry(0.15, 0.15, 0.4, 8), // Can
                new THREE.SphereGeometry(0.2, 6, 6) // Crushed ball
            ];
            const geo = types[Math.floor(Math.random() * types.length)];
            const mat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.2, z);
            mesh.rotation.set(Math.random(), Math.random(), Math.random());
            mesh.castShadow = true;
            scene.add(mesh);
            return mesh;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Movement logic
            const direction = new THREE.Vector3();
            const frontVector = new THREE.Vector3(0, 0, Number(keys['KeyS'] || keys['ArrowDown']) - Number(keys['KeyW'] || keys['ArrowUp']));
            const sideVector = new THREE.Vector3(Number(keys['KeyD'] || keys['ArrowRight']) - Number(keys['KeyA'] || keys['ArrowLeft']), 0, 0);

            direction.subVectors(frontVector, sideVector).normalize().multiplyScalar(player.speed).applyQuaternion(camera.quaternion);
            direction.y = 0; // Keep on ground

            controls.target.add(direction);
            camera.position.add(direction);

            // Rotate items & check collision
            items.forEach(item => {
                if(item.visible) {
                    item.rotation.y += 0.01;

                    const dist = camera.position.distanceTo(item.position);
                    if(dist < 2.0) {
                        item.visible = false;
                        score++;
                        document.getElementById('score').innerText = score;
                        if(score === totalItems) {
                            document.getElementById('win-screen').style.display = 'flex';
                        }
                    }
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>埼玉パーク・クラフトGO | 3Dアドベンチャー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'DotGothic16', sans-serif; background: #000; }
        #game-container { width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(0,0,0,0.7); color: #0f0; border: 2px solid #0f0; padding: 20px; border-radius: 10px; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .inv-slot { width: 60px; height: 60px; border: 2px solid #0f0; background: rgba(0,50,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        #stats { position: absolute; top: 20px; left: 20px; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; }
        .btn { pointer-events: auto; background: #0f0; color: #000; font-bold: true; padding: 10px 20px; cursor: pointer; border: none; }
        #dialog-box { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 80%; display: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="stats" class="panel">
            <div>🚩 埼玉探索中...</div>
            <div>🎒 アイテム: <span id="item-count">0</span>/5</div>
        </div>

        <div id="inventory">
            <div class="inv-slot" id="slot-0"></div>
            <div class="inv-slot" id="slot-1"></div>
            <div class="inv-slot" id="slot-2"></div>
            <div class="inv-slot" id="slot-3"></div>
            <div class="inv-slot" id="slot-4"></div>
        </div>

        <div id="instructions" class="panel">
            <h1 class="text-3xl mb-4" style="font-family: 'Mochiy Pop One';">埼玉パーク・クラフトGO</h1>
            <p class="mb-4">【操作方法】<br>WASD または 矢印キー：移動<br>マウス：視点操作<br>クリック：アイテム取得・建築</p>
            <button class="btn" onclick="startGame()">冒険をはじめる！</button>
        </div>

        <div id="dialog-box" class="panel text-xl">
            <div id="dialog-text"></div>
            <div class="text-right mt-2 text-sm">クリックで閉じる</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, clock;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const items = [];
        let collectedCount = 0;
        const inventory = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky Blue
            scene.fog = new THREE.Fog(0x87ceeb, 0, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(light);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Ground (Saitama Map)
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x2e7d32 }); // Saitama Green
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Grid for "Minecraft" feel
            const grid = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
            grid.position.y = 0.05;
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            // Player Avatar (Haniwa-like)
            const playerGroup = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 2, 8);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xcd853f });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1;
            playerGroup.add(body);

            const headGeo = new THREE.SphereGeometry(0.6, 8, 8);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.y = 2.2;
            playerGroup.add(head);

            player = playerGroup;
            scene.add(player);

            camera.position.set(0, 5, 10);
            camera.lookAt(player.position);

            // Generate Random Items (Trivia Boxes)
            const trivia = [
                { emoji: "🥟", name: "十万石まんじゅう", text: "「うまい、うますぎる」でおなじみの埼玉銘菓である。" },
                { emoji: "🏺", name: "ハニワ", text: "埼玉は古墳が多く、ハニワの出荷量も多いのだ。" },
                { emoji: "🕊️", name: "シラコバト", text: "埼玉県の県鳥である。とても愛らしい。" },
                { emoji: "🏟️", name: "スタジアム", text: "浦和レッズや大宮アルディージャなど、サッカーが熱い！" },
                { emoji: "🌳", name: "ケヤキ", text: "埼玉県の県木である。多くの公園に植えられている。" }
            ];

            for(let i=0; i<5; i++) {
                const boxGeo = new THREE.BoxGeometry(1, 1, 1);
                const boxMat = new THREE.MeshPhongMaterial({ color: 0xffff00 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(Math.random()*40 - 20, 0.5, Math.random()*40 - 20);
                box.userData = trivia[i];
                scene.add(box);
                items.push(box);
            }

            clock = new THREE.Clock();
            animate();
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 10;

            if (moveForward) player.position.z -= speed * delta;
            if (moveBackward) player.position.z += speed * delta;
            if (moveLeft) player.position.x -= speed * delta;
            if (moveRight) player.position.x += speed * delta;

            // Camera Follow
            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 10, player.position.z + 15), 0.1);
            camera.lookAt(player.position);

            // Item Collection Detection
            items.forEach((item, idx) => {
                if (item.visible && player.position.distanceTo(item.position) < 2) {
                    collectItem(item);
                }
                item.rotation.y += 0.02;
            });

            renderer.render(scene, camera);
        }

        function collectItem(item) {
            item.visible = false;
            inventory.push(item.userData);
            collectedCount++;
            document.getElementById('item-count').textContent = collectedCount;

            // Update UI slots
            const slot = document.getElementById(`slot-${collectedCount - 1}`);
            if (slot) slot.textContent = item.userData.emoji;

            showDialog(item.userData.name, item.userData.text);

            if (collectedCount === 5) {
                setTimeout(() => {
                    showDialog("コンプリート！", "全てのアイテムを集めた！君は真の埼玉マスターだ！さあ、この素材で自分だけの公園を作ろう（開発中...）");
                }, 3000);
            }
        }

        function showDialog(title, text) {
            const box = document.getElementById('dialog-box');
            const content = document.getElementById('dialog-text');
            content.innerHTML = `<strong>【${title}】</strong><br>${text}`;
            box.style.display = 'block';
            box.onclick = () => box.style.display = 'none';
        }

        function startGame() {
            document.getElementById('instructions').style.display = 'none';
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            init();
        }

        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>

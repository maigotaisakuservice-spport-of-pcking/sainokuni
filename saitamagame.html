<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAITAMA GO: 3D公園探検 | 2026 Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "selector"
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Noto Sans JP', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ui-element { pointer-events: auto; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; color: #2c3e50; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .score-board { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: white; padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(5px); }
        .controls-hint { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; font-size: 12px; }

        #loading-screen {
            position: fixed; inset: 0; background: #2e7d32; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s;
        }
        .progress-bar { width: 250px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .progress-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s; }

        #win-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 class="text-3xl font-bold text-white mb-2" style="font-family: 'Mochiy Pop One';">SAITAMA GO</h1>
        <p class="text-white opacity-80">3Dアセット読み込み中...</p>
        <div class="progress-bar"><div class="progress-fill" id="loader-fill"></div></div>
    </div>

    <div id="win-screen">
        <h2 class="text-5xl font-bold text-yellow-400 mb-4" style="font-family: 'Mochiy Pop One';">CLEAR!</h2>
        <p class="text-white text-xl mb-8 text-center">全ての公園アイテムを見つけました！<br>あなたは埼玉公園マスターです。</p>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="bg-white text-green-700 font-bold px-8 py-3 rounded-full hover:scale-105 transition">もう一度遊ぶ</button>
            <a href="saitama-mini-game.html" class="bg-green-600 text-white font-bold px-8 py-3 rounded-full hover:scale-105 transition">戻る</a>
        </div>
    </div>

    <div class="ui-overlay">
        <a href="saitama-mini-game.html" class="ui-element back-btn">⬅ 戻る</a>
        <div class="score-board">
            <div class="text-xs opacity-70 mb-1">COLLECTED ITEMS</div>
            <div class="text-2xl font-bold"><span id="score">0</span> / 5</div>
        </div>
        <div class="controls-hint">
            <b>操作方法:</b><br>
            [W][A][S][D] or [↑][←][↓][→] : 移動<br>
            マウスドラッグ : 視点回転
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let items = [];
        let score = 0;
        const totalItems = 5;

        const player = {
            velocity: new THREE.Vector3(),
            speed: 0.15
        };
        const keys = {};

        function init() {
            // Setup Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 2;
            controls.maxDistance = 15;
            controls.maxPolarAngle = Math.PI / 2;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(50, 100, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x4caf50 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Decorations (Trees)
            for(let i=0; i<60; i++) {
                createTree(
                    (Math.random() - 0.5) * 80,
                    (Math.random() - 0.5) * 80
                );
            }

            // Target Items
            for(let i=0; i<totalItems; i++) {
                const item = createTargetItem(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40
                );
                items.push(item);
            }

            // Keyboard Events
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);

            // Fake Loading
            let fill = 0;
            const fillInterval = setInterval(() => {
                fill += 5;
                document.getElementById('loader-fill').style.width = fill + '%';
                if(fill >= 100) {
                    clearInterval(fillInterval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.opacity = '0';
                        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
                    }, 300);
                }
            }, 50);

            animate();
        }

        function createTree(x, z) {
            const group = new THREE.Group();

            // Trunk
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x5d4037 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            group.add(trunk);

            // Leaves
            const leaveGeo = new THREE.ConeGeometry(1, 2.5, 8);
            const leaveMat = new THREE.MeshPhongMaterial({ color: 0x2e7d32 });
            const leaves = new THREE.Mesh(leaveGeo, leaveMat);
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            group.add(leaves);

            group.position.set(x, 0, z);
            scene.add(group);
        }

        function createTargetItem(x, z) {
            const geo = new THREE.IcosahedronGeometry(0.5, 0);
            const mat = new THREE.MeshPhongMaterial({
                color: 0xffeb3b,
                emissive: 0xffeb3b,
                emissiveIntensity: 0.5
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 1, z);
            mesh.castShadow = true;
            scene.add(mesh);
            return mesh;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Movement logic
            const direction = new THREE.Vector3();
            const frontVector = new THREE.Vector3(0, 0, Number(keys['KeyS'] || keys['ArrowDown']) - Number(keys['KeyW'] || keys['ArrowUp']));
            const sideVector = new THREE.Vector3(Number(keys['KeyD'] || keys['ArrowRight']) - Number(keys['KeyA'] || keys['ArrowLeft']), 0, 0);

            direction.subVectors(frontVector, sideVector).normalize().multiplyScalar(player.speed).applyQuaternion(camera.quaternion);
            direction.y = 0; // Keep on ground

            controls.target.add(direction);
            camera.position.add(direction);

            // Rotate items
            items.forEach(item => {
                if(item.visible) {
                    item.rotation.y += 0.02;
                    item.position.y = 1 + Math.sin(Date.now() * 0.003) * 0.2;

                    // Collision detection (simple distance)
                    const dist = camera.position.distanceTo(item.position);
                    if(dist < 1.5) {
                        item.visible = false;
                        score++;
                        document.getElementById('score').innerText = score;
                        if(score === totalItems) {
                            document.getElementById('win-screen').style.display = 'flex';
                        }
                    }
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

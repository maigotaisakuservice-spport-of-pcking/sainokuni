<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAITAMA GAME ARCADE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Mochiy Pop One', sans-serif;
            touch-action: none;
            background-color: #000;
            color: #fff;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            height: 700px;
            max-height: 85vh;
            border: 4px solid #00ACC1;
            box-shadow: 0 0 20px #00ACC1;
            background-color: #0f172a;
        }
        .btn-cyber {
            background: linear-gradient(45deg, #00ACC1, #00838f);
            border: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 172, 193, 0.5);
        }
        .btn-cyber:hover {
            box-shadow: 0 0 20px #00ACC1;
            transform: scale(1.05);
        }
        .text-glow {
            text-shadow: 0 0 10px #00ACC1;
        }
        canvas {
            cursor: pointer;
        }
        .cyber-font { font-family: 'DotGothic16', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="game-world" class="relative rounded-2xl overflow-hidden game-container">

        <div id="title-screen" class="absolute inset-0 flex flex-col items-center justify-center p-8 z-50 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-800 to-black">
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-4xl font-bold text-white text-glow mb-2 cyber-font">SAITAMA_ARCADE</h1>
                <h2 class="text-xl md:text-2xl font-bold text-cyan-400 cyber-font">ver. 2026.04</h2>
            </div>
            <div class="w-full max-w-xs space-y-6">
                <div class="relative">
                    <button id="start-pk-game" class="w-full text-white text-xl font-bold py-4 px-6 rounded-lg btn-cyber">
                        ⚽ METAVERSE_PK
                    </button>
                    <button onclick="showHelp('pk')" class="absolute -right-12 top-1/2 -translate-y-1/2 bg-slate-800 p-2 rounded-full text-cyan-400 border border-cyan-400 hover:bg-cyan-400 hover:text-white transition-all">？</button>
                </div>
                <div class="relative">
                    <button id="start-catch-game" class="w-full text-white text-xl font-bold py-4 px-6 rounded-lg btn-cyber" style="background: linear-gradient(45deg, #f59e0b, #d97706);">
                        🧺 CATCH_SAITAMA
                    </button>
                    <button onclick="showHelp('catch')" class="absolute -right-12 top-1/2 -translate-y-1/2 bg-slate-800 p-2 rounded-full text-amber-500 border border-amber-500 hover:bg-amber-500 hover:text-white transition-all">？</button>
                </div>
                <button onclick="location.href='index.html'" class="w-full text-gray-400 text-sm font-bold py-2 px-6 rounded-lg border border-gray-700 hover:text-white hover:border-white transition-all">
                    EXIT_TO_PORTAL
                </button>
            </div>
            <div class="absolute bottom-4 text-cyan-900 text-[10px] cyber-font">LINKING_TO_SAITAMA_SYSTEM... OK</div>
        </div>

        <canvas id="game-canvas" class="hidden"></canvas>

        <div id="modal" class="hidden absolute inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-40">
            <div id="modal-content" class="bg-slate-900 border-2 border-cyan-500 rounded-2xl p-6 w-full max-w-sm text-center shadow-[0_0_30px_rgba(0,172,193,0.3)]">
            </div>
        </div>

        <!-- 遊び方モーダル -->
        <div id="help-modal" class="hidden absolute inset-0 bg-black bg-opacity-90 flex items-center justify-center p-6 z-[60]" onclick="closeHelp()">
            <div class="bg-slate-900 border-2 border-white p-8 rounded-3xl max-w-xs w-full relative" onclick="event.stopPropagation()">
                <h2 id="help-title" class="text-xl font-bold mb-4 cyber-font">遊び方</h2>
                <div id="help-text" class="text-sm text-gray-300 leading-relaxed mb-8"></div>
                <button class="w-full bg-white text-black py-3 rounded-xl font-bold" onclick="closeHelp()">UNDERSTOOD</button>
            </div>
        </div>

    </div>

    <script>
        const titleScreen = document.getElementById('title-screen');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');

        const gameWorld = document.getElementById('game-world');
        canvas.width = gameWorld.clientWidth;
        canvas.height = gameWorld.clientHeight;

        let activeGame = null;
        let animationFrameId;

        const synth = new Tone.Synth().toDestination();
        const polySynth = new Tone.PolySynth(Tone.Synth).toDestination();

        function playSound(note, duration) {
            if (Tone.context.state !== 'running') {
                Tone.context.resume();
            }
            synth.triggerAttackRelease(note, duration);
        }

        function playGoalSound() {
            if (Tone.context.state !== 'running') {
                Tone.context.resume();
            }
            polySynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "0.5");
        }

        const pkGame = {
            state: 'ready',
            shots: 5,
            goals: 0,
            currentShot: 0,
            ball: { x: 0, y: 0, radius: 15 },
            goal: { x: 0, y: 0, width: 220, height: 110 },
            keeper: { x: 0, y: 0, width: 50, height: 90, vx: 4 },
            target: { x: 0, y: 0 },
            isAiming: false,

            init() {
                this.state = 'ready';
                this.currentShot = 0;
                this.goals = 0;
                this.resetBallAndKeeper();
                this.start();
            },

            resetBallAndKeeper() {
                this.ball.x = canvas.width / 2;
                this.ball.y = canvas.height - 100;
                this.goal.x = canvas.width / 2 - this.goal.width / 2;
                this.goal.y = canvas.height * 0.18;
                this.keeper.x = canvas.width / 2;
                this.keeper.y = this.goal.y + 10;
                this.keeper.vx = (Math.random() * 5 + 3) * (Math.random() < 0.5 ? 1 : -1);
            },

            start() {
                activeGame = this;
                canvas.style.cursor = 'crosshair';
                this.state = 'ready';
                this.loop();
            },

            draw() {
                // サイバー背景
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // グリッド
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
                for(let j=0; j<canvas.height; j+=40) {
                    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
                }

                // ゴール
                ctx.strokeStyle = '#00ACC1';
                ctx.lineWidth = 4;
                ctx.strokeRect(this.goal.x, this.goal.y, this.goal.width, this.goal.height);
                ctx.fillStyle = 'rgba(0, 172, 193, 0.1)';
                ctx.fillRect(this.goal.x, this.goal.y, this.goal.width, this.goal.height);

                // キーパー (サイバー感)
                ctx.fillStyle = '#f43f5e';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#f43f5e';
                ctx.fillRect(this.keeper.x - this.keeper.width / 2, this.keeper.y, this.keeper.width, this.keeper.height);
                ctx.shadowBlur = 0;

                // ボール
                ctx.beginPath();
                ctx.arc(this.ball.x, this.ball.y, this.ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFF';
                ctx.fill();
                ctx.strokeStyle = '#00ACC1';
                ctx.lineWidth = 2;
                ctx.stroke();

                if (this.isAiming) {
                    ctx.beginPath();
                    ctx.moveTo(this.ball.x, this.ball.y);
                    ctx.lineTo(this.target.x, this.target.y);
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = '#cyan';
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.fillStyle = '#00ACC1';
                ctx.font = "20px 'DotGothic16'";
                ctx.textAlign = 'center';
                ctx.fillText(`GOALS: ${this.goals} / ATTEMPTS: ${this.currentShot}`, canvas.width / 2, 40);
            },

            update() {
                if (this.state === 'ready' || this.state === 'shooting') {
                    this.keeper.x += this.keeper.vx;
                    if (this.keeper.x < this.goal.x + this.keeper.width / 2 || this.keeper.x > this.goal.x + this.goal.width - this.keeper.width / 2) {
                        this.keeper.vx *= -1;
                    }
                }

                if (this.state === 'shooting') {
                    const dx = this.target.x - this.ball.x;
                    const dy = this.target.y - this.ball.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    this.ball.x += (dx / dist) * 25;
                    this.ball.y += (dy / dist) * 25;
                    this.ball.radius *= 0.97;

                    if (this.ball.y < this.goal.y + this.goal.height) {
                        this.checkGoal();
                    }
                }
            },

            checkGoal() {
                const keeperRect = {
                    x: this.keeper.x - this.keeper.width / 2,
                    y: this.keeper.y,
                    w: this.keeper.width,
                    h: this.keeper.height
                };
                const ballInGoal = this.ball.x > this.goal.x && this.ball.x < this.goal.x + this.goal.width && this.ball.y > this.goal.y;
                const ballBlocked = this.ball.x > keeperRect.x && this.ball.x < keeperRect.x + keeperRect.w && this.ball.y > keeperRect.y && this.ball.y < keeperRect.y + keeperRect.h;

                if (ballInGoal && !ballBlocked) {
                    this.goals++;
                    showTemporaryMessage("GOAL_CONNECTED", "#00ACC1", playGoalSound);
                } else {
                    showTemporaryMessage("BLOCK_DETECTED", "#f43f5e", () => playSound("C3", "0.5s"));
                }

                this.currentShot++;
                this.state = 'result';
                setTimeout(() => this.nextShot(), 1200);
            },

            nextShot() {
                if (this.currentShot >= this.shots) {
                    this.endGame();
                } else {
                    this.resetBallAndKeeper();
                    this.state = 'ready';
                }
            },

            endGame() {
                let couponHtml = "";
                if (this.goals >= 4) {
                    localStorage.setItem('saitama-coupon-unlocked', 'true');
                    couponHtml = `
                    <div class="mt-4 p-4 bg-cyan-950 border border-cyan-500 rounded-xl animate-pulse">
                        <p class="text-cyan-400 font-bold text-xs cyber-font">REWARD_CODE_UNLOCKED</p>
                        <p class="text-2xl font-black text-white tracking-widest">SAITAMA2026</p>
                        <p class="text-[10px] text-cyan-500 mt-2">ポータルのメニューからいつでも確認できます</p>
                    </div>`;
                }
                showModal(`
                    <h2 class="text-2xl font-bold mb-4 text-cyan-400 cyber-font">MISSION_REPORT</h2>
                    <p class="text-4xl font-bold mb-6">${this.goals} / ${this.shots} GOALS</p>
                    <p class="text-sm mb-6 text-slate-400">${this.goals >= 4 ? 'STAT: STRIKER_OPTIMIZED' : this.goals >= 2 ? 'STAT: ACCURACY_UPDATING' : 'STAT: RE-CALIBRATION_REQUIRED'}</p>
                    ${couponHtml}
                    <button onclick="returnToTitle()" class="w-full mt-6 text-white font-bold py-3 px-6 rounded-lg btn-cyber">BACK_TO_MENU</button>
                `);
                stopLoop();
            },

            handleMouseDown(e) {
                if (this.state !== 'ready') return;
                const pos = getMousePos(e);
                const dx = pos.x - this.ball.x;
                const dy = pos.y - this.ball.y;
                if (Math.sqrt(dx*dx + dy*dy) < this.ball.radius * 2) {
                    this.isAiming = true;
                }
            },

            handleMouseMove(e) {
                if (!this.isAiming) return;
                this.target = getMousePos(e);
            },

            handleMouseUp(e) {
                if (!this.isAiming) return;
                this.isAiming = false;
                this.state = 'shooting';
                playSound("A4", "0.1s");
            },

            loop() {
                this.update();
                this.draw();
                animationFrameId = requestAnimationFrame(() => this.loop());
            }
        };

        const catchGame = {
            state: 'playing',
            score: 0,
            timeLeft: 45,
            basket: { x: 0, y: 0, width: 110, height: 15 },
            items: [],
            itemTypes: {
                unagi: { emoji: '🐟', points: 30, name: 'UNAGI' },
                bonsai: { emoji: '🌳', points: 50, name: 'BONSAI' },
                ningyo: { emoji: '🎎', points: 20, name: 'NINGYO' },
                ball: { emoji: '⚽', points: 10, name: 'BALL' },
                takoyaki: { emoji: '🐙', points: -30, name: 'NOISE' },
                apple: { emoji: '🍎', points: -20, name: 'GLITCH' },
            },
            caughtItems: new Set(),

            init() {
                this.state = 'playing';
                this.score = 0;
                this.timeLeft = 45;
                this.items = [];
                this.caughtItems.clear();
                this.basket.x = canvas.width / 2 - this.basket.width / 2;
                this.basket.y = canvas.height - 60;
                this.start();
            },

            start() {
                activeGame = this;
                canvas.style.cursor = 'none';
                this.itemInterval = setInterval(() => this.spawnItem(), 400);
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    if (this.timeLeft <= 0) {
                        this.endGame();
                    }
                }, 1000);
                this.loop();
            },

            spawnItem() {
                const itemKeys = Object.keys(this.itemTypes);
                const key = itemKeys[Math.floor(Math.random() * itemKeys.length)];
                this.items.push({
                    ...this.itemTypes[key],
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    size: 40,
                    speed: Math.random() * 4 + 3
                });
            },

            draw() {
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // グリッド
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }

                ctx.font = "30px sans-serif";
                this.items.forEach(item => {
                    ctx.fillText(item.emoji, item.x, item.y);
                });

                ctx.fillStyle = '#f59e0b';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#f59e0b';
                ctx.fillRect(this.basket.x, this.basket.y, this.basket.width, this.basket.height);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#f59e0b';
                ctx.font = "18px 'DotGothic16'";
                ctx.textAlign = 'left';
                ctx.fillText(`SCORE: ${this.score}`, 20, 40);
                ctx.textAlign = 'right';
                ctx.fillText(`TIME: ${this.timeLeft}S`, canvas.width - 20, 40);
            },

            update() {
                if (this.state !== 'playing') return;

                this.items.forEach((item, index) => {
                    item.y += item.speed;

                    if (item.y > this.basket.y - 20 && item.y < this.basket.y + this.basket.height &&
                        item.x > this.basket.x - 20 && item.x < this.basket.x + this.basket.width) {
                        this.score += item.points;
                        if (item.points > 0) {
                            this.caughtItems.add(item.name);
                            playSound("C5", "0.05s");
                        } else {
                            playSound("A3", "0.1s");
                            gameWorld.style.animation = 'shake 0.2s';
                            setTimeout(() => gameWorld.style.animation = '', 200);
                        }
                        this.items.splice(index, 1);
                    }

                    if (item.y > canvas.height) {
                        this.items.splice(index, 1);
                    }
                });
            },

            endGame() {
                this.state = 'finished';
                clearInterval(this.itemInterval);
                clearInterval(this.timerInterval);
                stopLoop();

                let couponHtml = "";
                if (this.score >= 500) {
                    localStorage.setItem('saitama-coupon-unlocked', 'true');
                    couponHtml = `
                    <div class="mt-4 p-4 bg-amber-950 border border-amber-500 rounded-xl animate-pulse">
                        <p class="text-amber-400 font-bold text-xs cyber-font">REWARD_CODE_UNLOCKED</p>
                        <p class="text-2xl font-black text-white tracking-widest">SAITAMA2026</p>
                        <p class="text-[10px] text-amber-500 mt-2">ポータルのメニューからいつでも確認できます</p>
                    </div>`;
                }
                showModal(`
                    <h2 class="text-2xl font-bold mb-4 text-amber-500 cyber-font">CATCH_COMPLETE</h2>
                    <p class="text-4xl font-bold mb-4">${this.score}</p>
                    <p class="text-sm mb-4 text-slate-400">ITEM_TYPES_EXTRACTED: ${this.caughtItems.size}</p>
                    ${couponHtml}
                    <button onclick="returnToTitle()" class="w-full mt-6 text-white font-bold py-3 px-6 rounded-lg btn-cyber" style="background: linear-gradient(45deg, #f59e0b, #d97706);">BACK_TO_MENU</button>
                `);
            },

            handleMouseMove(e) {
                const pos = getMousePos(e);
                this.basket.x = pos.x - this.basket.width / 2;
                if (this.basket.x < 0) this.basket.x = 0;
                if (this.basket.x > canvas.width - this.basket.width) this.basket.x = canvas.width - this.basket.width;
            },

            loop() {
                this.update();
                this.draw();
                animationFrameId = requestAnimationFrame(() => this.loop());
            }
        };

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function showModal(html) {
            modalContent.innerHTML = html;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function showHelp(game) {
            const helpModal = document.getElementById('help-modal');
            const helpTitle = document.getElementById('help-title');
            const helpText = document.getElementById('help-text');

            if (game === 'pk') {
                helpTitle.textContent = "METAVERSE_PK";
                helpTitle.style.color = "#00ACC1";
                helpModal.querySelector('.bg-slate-900').style.borderColor = "#00ACC1";
                helpText.innerHTML = "マウスまたはタップでボールを飛ばす方向を決めて放そう！キーパーの動きを読んで、隙間を狙うのがコツだ。5回中4回以上ゴールでクーポン獲得！";
            } else {
                helpTitle.textContent = "CATCH_SAITAMA";
                helpTitle.style.color = "#f59e0b";
                helpModal.querySelector('.bg-slate-900').style.borderColor = "#f59e0b";
                helpText.innerHTML = "マウスまたはスワイプでカゴを左右に動かし、落ちてくる埼玉の名産品をキャッチしろ！特産品はプラス、爆弾やリンゴはマイナスだ。500点以上でクーポン獲得！";
            }
            helpModal.classList.remove('hidden');
            helpModal.classList.add('flex');
        }

        function closeHelp() {
            document.getElementById('help-modal').classList.add('hidden');
            document.getElementById('help-modal').classList.remove('flex');
        }

        function showTemporaryMessage(text, color, callback) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'cyber-font';
            msgDiv.textContent = text;
            msgDiv.style.position = 'absolute';
            msgDiv.style.left = '50%';
            msgDiv.style.top = '50%';
            msgDiv.style.transform = 'translate(-50%, -50%)';
            msgDiv.style.fontSize = '24px';
            msgDiv.style.fontWeight = 'bold';
            msgDiv.style.color = color;
            msgDiv.style.textShadow = `0 0 10px ${color}`;
            msgDiv.style.pointerEvents = 'none';
            msgDiv.style.zIndex = '100';
            gameWorld.appendChild(msgDiv);

            if(callback) callback();

            setTimeout(() => {
                gameWorld.removeChild(msgDiv);
            }, 800);
        }

        function returnToTitle() {
            hideModal();
            canvas.classList.add('hidden');
            titleScreen.classList.remove('hidden');
            activeGame = null;
            canvas.style.cursor = 'default';
        }

        function stopLoop() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        document.getElementById('start-pk-game').addEventListener('click', () => {
            titleScreen.classList.add('hidden');
            canvas.classList.remove('hidden');
            pkGame.init();
        });

        document.getElementById('start-catch-game').addEventListener('click', () => {
            titleScreen.classList.add('hidden');
            canvas.classList.remove('hidden');
            catchGame.init();
        });

        function handleStart(e) {
            if (e.cancelable) e.preventDefault();
            if (activeGame && activeGame.handleMouseDown) activeGame.handleMouseDown(e);
        }
        function handleMove(e) {
            if (e.cancelable) e.preventDefault();
            if (activeGame && activeGame.handleMouseMove) activeGame.handleMouseMove(e);
        }
        function handleEnd(e) {
            if (e.cancelable) e.preventDefault();
            if (activeGame && activeGame.handleMouseUp) activeGame.handleMouseUp(e);
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('touchend', handleEnd);

        window.addEventListener('resize', () => {
            canvas.width = gameWorld.clientWidth;
            canvas.height = gameWorld.clientHeight;
        });

        const styleSheet = document.createElement("style");
        styleSheet.type = "text/css";
        styleSheet.innerText = `
            @keyframes shake {
                0% { transform: translate(1px, 1px); }
                20% { transform: translate(-3px, 0px); }
                40% { transform: translate(1px, -1px); }
                60% { transform: translate(-3px, 1px); }
                80% { transform: translate(-1px, -1px); }
                100% { transform: translate(1px, -2px); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>

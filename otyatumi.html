<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超・狭山茶摘み 2026 | 埼玉県紹介サイト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://photock.jp/photo/2023/tea-field_saitama.jpg") center/cover no-repeat;
      font-family: 'Mochiy Pop One', sans-serif;
      overflow: hidden;
      color: #fff;
      height: 100vh;
    }

    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
      z-index: 100; pointer-events: none;
    }
    #ui-layer * { pointer-events: auto; }

    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 15px 25px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #score-display { font-size: 24px; color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
    #timer-display { font-size: 24px; color: #fbbf24; }

    .leaf {
      position: absolute;
      width: 80px; height: 80px;
      background-image: url("https://thumb.photo-ac.com/d0/d09de16b5f7becae910375baf7d5bb4a_t.jpeg");
      background-size: cover;
      cursor: pointer;
      clip-path: polygon(50% 0%, 85% 35%, 100% 50%, 85% 65%, 50% 100%, 15% 65%, 0% 50%, 15% 35%);
      filter: drop-shadow(0 0 10px rgba(0,255,0,0.5));
      transition: transform 0.1s;
      z-index: 50;
    }
    .leaf:hover { transform: scale(1.1); filter: brightness(1.2) drop-shadow(0 0 15px rgba(0,255,0,0.8)); }
    .leaf:active { transform: scale(0.9); }

    .particle {
      position: absolute; pointer-events: none;
      background: #4ade80; border-radius: 50%;
      z-index: 60;
    }

    #start-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; text-align: center;
    }
    .btn-neon {
      background: none; border: 2px solid #4ade80; color: #4ade80;
      padding: 15px 40px; font-size: 24px; border-radius: 50px;
      cursor: pointer; transition: all 0.3s;
      box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
    }
    .btn-neon:hover { background: #4ade80; color: #000; box-shadow: 0 0 30px rgba(74, 222, 128, 0.6); }

    #result-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 2000;
    }

    .cyber-title {
        font-family: 'DotGothic16', sans-serif;
        font-size: 3rem;
        letter-spacing: 4px;
        margin-bottom: 1rem;
        background: linear-gradient(to right, #4ade80, #22c55e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h1 class="cyber-title">超・狭山茶摘み 2026</h1>
    <p class="mb-8 text-emerald-300">制限時間内に、最高級の「新芽」をハイスピードで摘み取れ！</p>
    <button class="btn-neon" onclick="startGame()">SYSTEM START</button>
    <a href="index.html" class="mt-8 text-gray-400 hover:text-white transition-colors">ポータルへ戻る</a>
  </div>

  <div id="ui-layer">
    <div class="glass-panel" id="score-display">EXTRACTED: 0</div>
    <div class="flex gap-4">
        <div class="glass-panel cursor-pointer hover:bg-white/20 transition-colors" onclick="showHelp()">？</div>
        <div class="glass-panel" id="timer-display">TIME: 30.00</div>
    </div>
  </div>

  <!-- ヘルプモーダル -->
  <div id="help-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[3000] p-6" onclick="closeHelp()">
    <div class="bg-emerald-900 border-2 border-emerald-400 p-8 rounded-3xl max-w-md w-full relative" onclick="event.stopPropagation()">
        <h2 class="text-2xl font-bold mb-4 text-emerald-400">遊び方：狭山茶摘み</h2>
        <div class="text-gray-200 leading-relaxed">
            <p class="mb-4">画面のあちこちに現れる「茶葉（新芽）」を素早くクリックまたはタップして摘み取ってください。</p>
            <p class="mb-4">時間が経つと茶葉は消えてしまいます。後半になるほど出現スピードが上がります！</p>
            <p>30秒間で何枚摘めるか挑戦しましょう。</p>
        </div>
        <button class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold transition-colors" onclick="closeHelp()">わかった！</button>
    </div>
  </div>

  <div id="result-screen">
    <h2 class="text-4xl font-bold mb-4">EXTRACTION COMPLETE</h2>
    <div class="text-6xl font-bold text-emerald-400 mb-8" id="final-score">0</div>
    <div id="rank-msg" class="text-xl mb-12 text-gray-300">評価を計算中...</div>
    <div class="flex gap-4">
        <button class="btn-neon" onclick="location.reload()">RETRY</button>
        <button class="btn-neon" style="border-color:#fbbf24; color:#fbbf24;" onclick="location.href='index.html'">BACK TO HOME</button>
    </div>
  </div>

  <script>
    let score = 0;
    let timeLeft = 30.00;
    let gameActive = false;
    let spawnTimer;

    function startGame() {
      document.getElementById('start-screen').style.display = 'none';
      gameActive = true;
      spawnLeaf();
      update();
    }

    function spawnLeaf() {
      if(!gameActive) return;

      const leaf = document.createElement("div");
      leaf.className = "leaf";
      leaf.style.left = Math.random() * (window.innerWidth - 100) + "px";
      leaf.style.top = Math.random() * (window.innerHeight - 100) + "px";
      leaf.style.transform = `scale(0) rotate(${Math.random() * 360}deg)`;

      leaf.addEventListener("mousedown", (e) => {
        if(!gameActive) return;
        score++;
        document.getElementById('score-display').textContent = "EXTRACTED: " + score;
        createParticles(e.clientX, e.clientY);
        leaf.remove();
        spawnLeaf(); // 摘むとすぐ次が出る
      });

      document.body.appendChild(leaf);

      // アニメーション
      requestAnimationFrame(() => {
          leaf.style.transition = "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
          leaf.style.transform = `scale(1) rotate(${Math.random() * 360}deg)`;
      });

      // 消えるまでの時間（だんだん速くなる）
      const timeout = Math.max(800, 2000 - (score * 20));
      setTimeout(() => {
          if(leaf.parentNode) {
              leaf.style.transform = "scale(0)";
              setTimeout(() => leaf.remove(), 200);
              spawnLeaf();
          }
      }, timeout);
    }

    function createParticles(x, y) {
        for(let i=0; i<8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 8 + 4;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 10 + 5;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;

            let op = 1;
            function move() {
                p.style.left = parseFloat(p.style.left) + vx + 'px';
                p.style.top = parseFloat(p.style.top) + vy + 'px';
                op -= 0.05;
                p.style.opacity = op;
                if(op > 0) requestAnimationFrame(move);
                else p.remove();
            }
            move();
        }
    }

    function showHelp() {
        document.getElementById('help-modal').classList.remove('hidden');
        document.getElementById('help-modal').classList.add('flex');
        gameActive = false;
    }

    function closeHelp() {
        document.getElementById('help-modal').classList.add('hidden');
        document.getElementById('help-modal').classList.remove('flex');
        if(timeLeft < 30 && timeLeft > 0) gameActive = true;
    }

    function update() {
        if(!gameActive) {
            requestAnimationFrame(update);
            return;
        }
        timeLeft -= 0.016;
        if(timeLeft <= 0) {
            timeLeft = 0;
            endGame();
        }
        document.getElementById('timer-display').textContent = "TIME: " + timeLeft.toFixed(2);
        requestAnimationFrame(update);
    }

    function endGame() {
        gameActive = false;
        document.querySelectorAll('.leaf').forEach(l => l.remove());
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-score').textContent = score;

        if (score >= 50) {
            localStorage.setItem('saitama-coupon-unlocked', 'true');
            const couponDiv = document.createElement('div');
            couponDiv.className = "mt-4 p-4 bg-emerald-950 border border-emerald-500 rounded-xl animate-pulse text-center";
            couponDiv.innerHTML = `
                <p class="text-emerald-400 font-bold text-xs">REWARD_CODE_UNLOCKED</p>
                <p class="text-2xl font-black text-white tracking-widest">SAITAMA2026</p>
                <p class="text-[10px] text-emerald-500 mt-2">ポータルのメニューからいつでも確認できます</p>
            `;
            document.getElementById('result-screen').insertBefore(couponDiv, document.getElementById('rank-msg').nextSibling);
        }

        let msg = "";
        if(score > 60) msg = "伝説の茶師級：あなたの指先は光速を超えた。";
        else if(score > 40) msg = "熟練の摘み手級：狭山の未来を担う逸材である。";
        else if(score > 20) msg = "見習い摘み手級：さらなる修行を推奨する。";
        else msg = "一般市民級：お茶の心を知ることから始めよう。";
        document.getElementById('rank-msg').textContent = msg;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獲得済みクーポン | SAITAMA PARKS 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Mochiy+Pop+One&family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .header-main {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            color: #ecf0f1;
            padding: 1rem 2rem;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        main { max-width: 800px; margin: 100px auto 4rem; padding: 0 1.5rem; }
        .coupon-card {
            background: white;
            border: 2px dashed #ff9800;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .coupon-card::before, .coupon-card::after {
            content: ''; position: absolute; top: 50%; width: 30px; height: 30px; background: var(--bg-color); border-radius: 50%; transform: translateY(-50%);
        }
        .coupon-card::before { left: -15px; }
        .coupon-card::after { right: -15px; }

        .coupon-title { font-family: 'Mochiy Pop One'; color: #e65100; font-size: 1.4rem; margin-bottom: 0.5rem; }
        .coupon-desc { font-weight: 700; color: #333; margin-bottom: 1rem; }
        .coupon-meta { font-size: 0.8rem; color: #777; margin-bottom: 1.5rem; }
        .qr-placeholder { background: #f5f5f5; padding: 1rem; border-radius: 10px; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #999; border: 1px solid #ddd; }
        .empty-state { text-align: center; padding: 5rem 0; opacity: 0.5; }
        .empty-state .icon { font-size: 5rem; display: block; margin-bottom: 1rem; }
        .reset-info { background: #fffde7; padding: 1rem; border-radius: 10px; font-size: 0.8rem; margin-top: 2rem; text-align: center; color: #6d4c41; }
    </style>
</head>
<body>
<header class="header-main">
    <h1 class="text-xl font-bold tracking-tighter" style="font-family: 'Mochiy Pop One';"><a href="index.html" style="color: inherit; text-decoration: none;">SAITAMA PARKS</a></h1>
        <nav class="hidden md:flex items-center gap-6">
        <a id="coupon-menu-item" href="coupons.html" class="hidden text-yellow-400 font-bold animate-pulse" title="クーポン獲得！">💎 特典</a>
        <a href="news.html" class="hover-accent-text font-bold">NEWS</a>
        <a href="destinations/maruyama.html" class="hover-accent-text font-bold">公園を探す</a>
        <a href="map.html" class="hover-accent-text font-bold">マップ</a>
        <a href="saitama-mini-game.html" class="hover-accent-text font-bold">ゲーム</a>
        <a href="gallery.html" class="hover-accent-text font-bold">ギャラリー</a>
        <div class="flex items-center gap-2 ml-2 border-l border-white/20 pl-4">
            <button onclick="toggleTheme()" class="hover:scale-110 transition-transform" id="theme-toggle-icon" title="カラー変更">🌳</button>
            <button onclick="toggleDarkMode()" class="hover:scale-110 transition-transform" title="ダークモード切替">🌓</button>
        </div>
    </nav>
</header>

<main>
    <h2 class="text-3xl font-bold mb-8 text-center" style="font-family: 'Mochiy Pop One';">My 特典・クーポン</h2>

    <div id="coupons-list">
        <!-- JSでクーポンを表示 -->
    </div>

    <div id="empty-view" class="empty-state" style="display: none;">
        <span class="icon">🎟️</span>
        <p class="font-bold">まだ獲得したクーポンはありません。</p>
        <p class="text-sm mt-2">ゲームをプレイしたり、スタンプを集めて<br>お得なクーポンを手に入れよう！</p>
        <a href="saitama-mini-game.html" class="inline-block mt-8 style="background-color: var(--accent-btn);" text-white font-bold py-3 px-8 rounded-full">ゲームセンターへ</a>
    </div>

    <div class="reset-info">
        💡 クーポンは毎月1日にリセットされます。<br>お早めにご利用ください。
    </div>
</main>

<script src="js/common.js"></script>
<script src="js/coupon-manager.js"></script>
<script>
    async function renderCoupons() {
        // Load data wait
        let retryCount = 0;
        while(window.couponManager.couponsData.length === 0 && retryCount < 10) {
            await new Promise(r => setTimeout(r, 100));
            retryCount++;
        }

        const earned = window.couponManager.getEarnedCoupons();
        const listContainer = document.getElementById('coupons-list');
        const emptyView = document.getElementById('empty-view');

        if (earned.length === 0) {
            emptyView.style.display = 'block';
            return;
        }

        emptyView.style.display = 'none';
        listContainer.innerHTML = earned.map(c => `
            <div class="coupon-card animate-in zoom-in duration-300">
                <div class="coupon-title">${c.title}</div>
                <div class="coupon-desc">${c.description}</div>
                <div class="coupon-meta">獲得元: ${c.source} | 有効期限: ${getEndOfMonth()}</div>
                <div class="qr-placeholder">
                    QRコード提示用<br>(開発中イメージ)
                </div>
                <p class="text-[10px] text-gray-400 mt-4">店舗スタッフにこの画面を提示してください</p>
            </div>
        `).join('');
    }

    function getEndOfMonth() {
        const d = new Date();
        const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);
        return `${lastDay.getFullYear()}/${lastDay.getMonth() + 1}/${lastDay.getDate()}`;
    }

    document.addEventListener('DOMContentLoaded', renderCoupons);
</script>
</body>
</html>

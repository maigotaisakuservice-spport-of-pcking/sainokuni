<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO GALLERY | SAITAMA PARKS 2026</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "selector"
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Mochiy+Pop+One&family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .header-main {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            color: #ecf0f1;
            padding: 1rem 2rem;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px 0;
        }
        .gallery-card {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--card-shadow);
        }
        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .gallery-card:hover img { transform: scale(1.1); }
        .gallery-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            color: white;
        }
        .gallery-card:hover .overlay { opacity: 1; }

        /* ライトボックス */
        #lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #lightbox.active { display: flex; animation: fadeIn 0.3s; }
        #lightbox img { max-width: 90%; max-height: 80vh; border-radius: 8px; object-fit: contain; }
        .lightbox-close { position: absolute; top: 30px; right: 30px; font-size: 40px; color: white; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

<header class="header-main">
    <div class="flex items-center gap-4">
        <h1 class="text-2xl font-bold tracking-tighter" style="font-family: 'Mochiy Pop One';"><a href="index.html">SAITAMA PARKS</a></h1>
    </div>
    <nav class="flex items-center gap-4 md:gap-8">
        <a href="destinations/kita-urawa-park.html" class="hover-accent-text font-bold text-sm md:text-base">公園を探す</a>
        <a href="map.html" class="hover-accent-text font-bold text-sm md:text-base">マップ</a>
        <a href="saitama-mini-game.html" class="hover-accent-text font-bold text-sm md:text-base">ゲーム</a>
        <button onclick="toggleMenu()" class="hover-accent-text font-bold text-sm md:text-base">MENU</button>
        <div class="flex items-center gap-2 ml-2 border-l border-white/20 pl-4">
            <button onclick="toggleAccessibilityPanel()" class="hover:scale-110 transition-transform text-xl" id="theme-toggle-icon" title="アクセシビリティ設定">⚙️</button>
        </div>
    </nav>
</header>

    <!-- モバイルメニュー -->
    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="menu-content" class="menu-content">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold" style="font-family: 'Mochiy Pop One';">MENU</h2>
                <button onclick="toggleMenu()" class="text-2xl">&times;</button>
            </div>
            <nav class="flex flex-col gap-6 text-lg">
                <a href="index.html" class="flex items-center gap-3">🏠 ホーム</a>
                <a href="destinations/kita-urawa-park.html" class="flex items-center gap-3">🌳 公園を探す</a>
                <a href="map.html" class="flex items-center gap-3">🗺️ マップ</a>
                <a href="saitama-mini-game.html" class="flex items-center gap-3">🎮 ゲーム</a>
                <hr class="border-slate-700">
                <button onclick="toggleTheme()" class="flex items-center gap-3 w-full text-left"><span id="theme-toggle-icon-mobile">🌳</span> カラー変更</button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full text-left"><span>🌓</span> ダークモード切替</button>
            </nav>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-16">
        <h2 class="text-4xl font-bold mb-2 text-center" style="font-family: 'Mochiy Pop One';">PHOTO GALLERY</h2>
        <p class="text-gray-500 text-center mb-12">埼玉の公園で出会える、四季折々の表情。</p>

        <div class="gallery-grid" id="gallery-container">
            <!-- 公園の主要な写真 -->
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="images/kita_urawa_park.jpg" alt="北浦和公園" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">北浦和公園（上尾）</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="images/omiya_park.jpg" alt="大宮公園" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">大宮公園（さいたま）</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="images/tokorozawa_park.jpg" alt="所沢航空公園" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">所沢航空記念公園（所沢）</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="images/shinrin_park.jpg" alt="森林公園" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">国営武蔵丘陵森林公園（滑川）</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="images/akigase_park.jpg" alt="秋ヶ瀬公園" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">秋ヶ瀬公園（さいたま）</span></div>
            </div>

            <!-- その他のイメージ -->
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="https://images.unsplash.com/photo-1519331379826-f10be5486c6f?q=80&w=2070&auto=format&fit=crop" alt="公園の木々" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">公園の木漏れ日</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="https://images.unsplash.com/photo-1544551763-47a0159f9234?q=80&w=2070&auto=format&fit=crop" alt="水辺" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">水辺の涼景</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox(this)">
                <img loading="lazy" decoding="async" loading="lazy" decoding="async" src="https://images.unsplash.com/photo-1519331379826-f10be5486c6f?q=80&w=2070&auto=format&fit=crop" alt="芝生" loading="lazy" decoding="async">
                <div class="overlay"><span class="font-bold">広々とした芝生広場</span></div>
            </div>
        </div>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img loading="lazy" decoding="async" loading="lazy" decoding="async" id="lightbox-img" src="" alt="拡大画像">
        <p id="lightbox-caption" class="text-white mt-4 text-xl font-bold"></p>
    </div>

<footer>
    <div class="max-w-6xl mx-auto px-6">
        <div class="footer-logo">SAITAMA PARKS</div>
        <hr>
        <p class="text-sm opacity-80">© 2026 埼玉県公園ガイドポータル - 自然と共に生きる。</p>
        <div class="footer-links mt-8 flex justify-center gap-12 text-sm flex-wrap">
            <a onclick="openModal('about')" class="cursor-pointer">サイトについて</a>
            <a onclick="openModal('access')" class="cursor-pointer">アクセス</a>
            <a onclick="openModal('copyright')" class="cursor-pointer">著作権</a>
        </div>
    </div>
</footer>

    <button onclick="scrollToTop()" class="go-to-top-button" aria-label="トップへ戻る">↑</button>
    <script defer src="js/common.js" defer></script>
    <script>
        function openLightbox(card) {
            const img = card.querySelector('img');
            const caption = card.querySelector('.overlay').textContent;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCap = document.getElementById('lightbox-caption');

            lightboxImg.src = img.src;
            lightboxCap.textContent = caption;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>

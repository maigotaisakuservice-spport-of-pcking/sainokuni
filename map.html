<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>さいたま周辺施設マップ | 2026年版</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">

    <style>
        .header-main {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            color: #ecf0f1;
            padding: 1rem 2rem;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        #map { height: 100%; width: 100%; z-index: 1; }
        .custom-div-icon {
            border-radius: 50%; text-align: center; line-height: 30px; font-size: 18px;
            color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;
            width: 30px !important; height: 30px !important;
        }
        .map-controls {
            background: var(--card-bg); color: var(--text-color); padding: 1rem;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
            margin-top: 70px; border-bottom: 1px solid var(--border-color);
        }
        .filter-chip {
            padding: 5px 15px; border-radius: 20px; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s; border: 1px solid var(--border-color);
            background: var(--bg-color); display: flex; align-items: center; gap: 5px;
        }
        .filter-chip.active { background: #8BC34A; border-color: #8BC34A; color: #1b5e20; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="header-main">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="text-2xl md:hidden">☰</button>
            <h1 class="text-xl font-bold tracking-tighter" style="font-family: 'Mochiy Pop One';">SAITAMA PARKS</h1>
        </div>
        <nav class="hidden md:flex items-center gap-6">
        <div class="flex items-center gap-2 px-3 border-r border-white/20 mr-2">
            <button onclick="setSaicolor('green')" class="saicolor-btn saicolor-green" title="緑（自然）"></button>
            <button onclick="setSaicolor('blue')" class="saicolor-btn saicolor-blue" title="青（水・空）"></button>
            <button onclick="setSaicolor('red')" class="saicolor-btn saicolor-red" title="赤（情熱）"></button>
        </div>
            <a id="coupon-menu-item" href="index.html?reward=true" class="hidden text-yellow-400 font-bold animate-pulse" title="クーポン獲得！">💎 特典</a>
            <a href="news.html" class="hover:text-emerald-400 font-bold">NEWS</a>
            <a href="destinations/maruyama.html" class="hover:text-emerald-400 font-bold">公園を探す</a>
            <a href="map.html" class="hover:text-emerald-400 font-bold">マップ</a>
            <a href="saitama-mini-game.html" class="hover:text-emerald-400 font-bold">ゲーム</a>
            <a href="gallery.html" class="hover:text-emerald-400 font-bold">ギャラリー</a>
            <button onclick="toggleTheme()" class="theme-toggle-btn text-xl" id="theme-toggle-icon">🌙</button>
        </nav>
    </header>

    <!-- モバイルメニュー -->
    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="menu-content" class="menu-content">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold" style="font-family: 'Mochiy Pop One';">MENU</h2>
                <button onclick="toggleMenu()" class="text-2xl">&times;</button>
            </div>
            <nav class="flex flex-col gap-6 text-lg">
                <a href="index.html" class="flex items-center gap-3">🏠 ホーム</a>
                <a href="news.html" class="flex items-center gap-3">📰 NEWS</a>
                <a href="destinations/maruyama.html" class="flex items-center gap-3">🌳 公園を探す</a>
                <a href="map.html" class="flex items-center gap-3">🗺️ マップ</a>
                <a href="saitama-mini-game.html" class="flex items-center gap-3">🎮 ゲーム</a>
                <a href="gallery.html" class="flex items-center gap-3">🖼️ ギャラリー</a>
                <hr class="border-slate-700">
                <div class="flex items-center justify-around py-2">
                    <button onclick="setSaicolor('green')" class="saicolor-btn saicolor-green"></button>
                    <button onclick="setSaicolor('blue')" class="saicolor-btn saicolor-blue"></button>
                    <button onclick="setSaicolor('red')" class="saicolor-btn saicolor-red"></button>
                </div>
                <button onclick="toggleTheme()" class="flex items-center gap-3 w-full text-left">
                    <span id="theme-toggle-icon-mobile">🌙</span> ダークモード切替
                </button>
            </nav>
        </div>
    </div>

    <div class="map-controls">
        <div class="flex flex-wrap justify-center gap-2" id="filter-container">
            <div class="filter-chip active" data-type="all">すべて</div>
            <div class="filter-chip" data-type="parks">🌳 公園</div>
            <div class="filter-chip" data-type="stations">🚉 駅</div>
            <div class="filter-chip" data-type="toilets">🚻 トイレ</div>
        </div>
        <button id="locate-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-6 rounded-full transition-colors self-center shadow-lg">
            現在地を取得 & 周辺100mを検索
        </button>
    </div>

    <main class="flex-grow relative">
        <div id="map"></div>
        <div id="loading-overlay" class="absolute inset-0 bg-white bg-opacity-70 flex items-center justify-center z-[2000] hidden">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-500 mx-auto mb-2"></div>
                <p class="font-bold text-gray-700">データを取得中...</p>
            </div>
        </div>
    </main>

    <script type="module">
        // 埼玉 5大公園の座標
        const big5Parks = [
            { name: "大宮公園", pos: [35.9224, 139.6338], url: "destinations/omiya_park.html" },
            { name: "所沢航空記念公園", pos: [35.7981, 139.4715], url: "destinations/tokorozawa_park.html" },
            { name: "国営武蔵丘陵森林公園", pos: [36.0858, 139.3755], url: "destinations/shinrin_park.html" },
            { name: "秋ヶ瀬公園", pos: [35.8504, 139.6053], url: "destinations/akigase_park.html" },
            { name: "丸山公園", pos: [35.9680, 139.5444], url: "destinations/maruyama.html" }
        ];

        const map = L.map('map').setView([35.9064, 139.6238], 11); // 埼玉県全体が見えるレベルで初期化

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const createIcon = (emoji, color) => L.divIcon({
            html: `<div class="custom-div-icon" style="background-color: ${color};">${emoji}</div>`,
            className: '', iconSize: [30, 30], iconAnchor: [15, 15]
        });

        const markers = L.markerClusterGroup().addTo(map);
        const staticMarkers = L.layerGroup().addTo(map); // 常に表示する5選用
        let currentType = 'all';

        // 5大公園のピンを設置
        function initBig5() {
            big5Parks.forEach(p => {
                const marker = L.marker(p.pos, {
                    icon: createIcon('⭐', '#FFD700')
                }).addTo(staticMarkers);
                marker.bindPopup(`
                    <div class="p-2">
                        <b class="text-lg">${p.name}</b><br>
                        <span class="text-xs text-emerald-600 font-bold">埼玉5大公園の1つ</span><br>
                        <a href="${p.url}" class="inline-block mt-2 bg-emerald-500 text-white text-xs px-2 py-1 rounded">詳細ページを見る</a>
                    </div>
                `);
            });
        }
        initBig5();

        // Overpass API を使用して実際の施設データを取得
        async function fetchOSMData(type, center, radius = 100) {
            const lat = center.lat;
            const lon = center.lng;
            let query = "";
            let emoji = "📍";
            let color = "#333";

            if (type === 'parks') {
                query = `node["leisure"="park"](around:${radius},${lat},${lon});way["leisure"="park"](around:${radius},${lat},${lon});`;
                emoji = "🌳"; color = "#2e7d32";
            } else if (type === 'stations') {
                query = `node["railway"="station"](around:${radius},${lat},${lon});`;
                emoji = "🚉"; color = "#1565c0";
            } else if (type === 'toilets') {
                query = `node["amenity"="toilet"](around:${radius},${lat},${lon});`;
                emoji = "🚻"; color = "#f57c00";
            } else {
                // all の場合は主要なものをまとめて取得
                query = `
                    (node["leisure"="park"](around:${radius},${lat},${lon});
                     way["leisure"="park"](around:${radius},${lat},${lon});
                     node["railway"="station"](around:${radius},${lat},${lon});
                     node["amenity"="toilet"](around:${radius},${lat},${lon});)
                `;
            }

            const url = `https://overpass-api.de/api/interpreter?data=[out:json];${query}out center;`;

            document.getElementById('loading-overlay').classList.remove('hidden');
            try {
                const res = await fetch(url);
                const data = await res.json();

                markers.clearLayers();
                data.elements.forEach(el => {
                    let mEmoji = emoji;
                    let mColor = color;
                    const pos = el.center ? [el.center.lat, el.center.lon] : [el.lat, el.lon];

                    if (type === 'all') {
                        const tags = el.tags || {};
                        if (tags.leisure === 'park') { mEmoji = "🌳"; mColor = "#2e7d32"; }
                        else if (tags.railway === 'station') { mEmoji = "🚉"; mColor = "#1565c0"; }
                        else if (tags.amenity === 'toilet') { mEmoji = "🚻"; mColor = "#f57c00"; }
                    }

                    const marker = L.marker(pos, { icon: createIcon(mEmoji, mColor) });
                    const tags = el.tags || {};
                    const name = tags.name || tags.operator || "名称不明の施設";

                    let info = `<b>${name}</b><br>`;
                    if (tags.leisure === 'park') {
                        const wheel = tags.wheelchair === 'yes' ? '✅' : '❓';
                        const sport = tags.sport ? `(${tags.sport})` : '';
                        info += `バリアフリー: ${wheel}<br>スポーツ: ${sport || '不明'}`;
                    } else if (tags.amenity === 'toilet') {
                        const wheel = tags.wheelchair === 'yes' ? '♿ 車いす対応' : '不明';
                        info += `トイレ情報: ${wheel}`;
                    }

                    marker.bindPopup(info);
                    marker.addTo(markers);
                });

                // 検索範囲を示す円を描画
                if (window.radiusCircle) map.removeLayer(window.radiusCircle);
                window.radiusCircle = L.circle([lat, lon], {
                    radius: radius,
                    color: '#8BC34A',
                    fillColor: '#8BC34A',
                    fillOpacity: 0.1,
                    dashArray: '5, 10'
                }).addTo(map);

            } catch (e) {
                console.error("OSMデータの取得に失敗:", e);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        // 初期表示と移動時の更新
        map.on('moveend', () => {
            // 自動更新は半径広めで、ボタン押下時は100mに限定
            // fetchOSMData(currentType, map.getCenter(), 500);
        });

        // フィルター操作
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentType = chip.dataset.type;
                fetchOSMData(currentType, map.getCenter(), 100);
            });
        });

        // 現在地取得 & 100m検索
        document.getElementById('locate-btn').addEventListener('click', () => {
            map.locate({setView: true, maxZoom: 18});
        });

        map.on('locationfound', (e) => {
            L.marker(e.latlng, { icon: createIcon('🚶', '#F44336') }).addTo(map)
                .bindPopup("あなたはここにいます").openPopup();
            fetchOSMData(currentType, e.latlng, 100);
        });

        // 初回ロードは5大公園を表示するのみ（100m検索は実行しない）
    </script>
    <script src="js/common.js"></script>
</body>
</html>
